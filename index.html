<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/12klOqNz4ER47bvsZrvqJMkYnghi_T63J_LmaYvNeb9c/gviz/tq?tqx=out:json&sheet=Dishari1";

let allProducts = [];

let currentImages = [];
let currentIndex = 0;
let zoomLevel = 1;
let currentCategory = "All";

const reviews = [

"Excellent quality and beautiful fitting.",
"Very soft fabric and premium design.",
"Looks exactly same as picture.",
"Super comfortable for daily wear.",
"Perfect product for this price range.",
"Packaging and delivery was impressive.",
"Colour and stitching both are amazing.",
"Very stylish and elegant collection.",
"Fabric quality exceeded expectations.",
"Loved the trendy modern look.",
"Perfect festive collection for women.",
"Material feels rich and comfortable."

];

async function fetchProducts(){

try{

const response = await fetch(sheetURL);

const text = await response.text();

const json =
JSON.parse(text.substring(47).slice(0,-2));

const rows = json.table.rows;

allProducts = rows.map((row,index)=>{

const cols = row.c || [];

return{

priority: cols[0]?.v || "",
name: cols[1]?.v || "",
category: cols[2]?.v || "",
show: cols[3]?.v || "",
price: cols[4]?.v || "",
description: cols[5]?.v || "",

image: cleanURL(cols[6]?.v || ""),   // G
stock: cols[7]?.v || "",
offer: cols[8]?.v || "",

img2: cleanURL(cols[9]?.v || ""),    // J
img3: cleanURL(cols[10]?.v || ""),   // K
img4: cleanURL(cols[11]?.v || ""),   // L

size: cols[12]?.v || "",             // M
description2: cols[13]?.v || "",     // N

id:"DS"+(100000+index)

};

})

.filter(item =>
String(item.show).toLowerCase()==="yes"
)

.sort((a,b)=>
Number(a.priority)-Number(b.priority)
);

const newArrivalProducts =
allProducts.filter(item =>
String(item.category).toLowerCase()==="new arrivals"
);

displayProducts(newArrivalProducts);

}catch(error){

console.log("Sheet Error :",error);

}

}

/* FIX IMAGE URL */

function cleanURL(url){

if(!url) return "";

return String(url)
.replace(/"/g,"")
.replace(/\s/g,"")
.trim();

}

/* DISPLAY PRODUCTS */

function displayProducts(products){

const container =
document.getElementById("productGrid");

container.innerHTML="";

products.forEach((product)=>{

let priceHTML="";

if(product.offer){

priceHTML=`

<div class="price-row">

<span class="old-price">
₹${product.price}
</span>

<span class="new-price">
₹${product.offer}
</span>

<br>

<div class="offer-tag">
Today Offer
</div>

</div>

`;

}else{

priceHTML=`

<div class="price-row">

<span class="new-price">
₹${product.price}
</span>

</div>

`;

}

container.innerHTML += `

<div class="product-card">

<img
class="product-image"
loading="lazy"
src="${product.image}"
onerror="this.src='https://via.placeholder.com/500x700?text=No+Image'"
onclick='openModal(${JSON.stringify(product)})'>

<div class="product-details">

<div class="product-id">
${product.id}
</div>

<div class="product-name">
${product.name}
</div>

<div class="product-description">
${product.description}
</div>

${priceHTML}

<div class="stock ${product.stock==="Out Of Stock" ? "outstock":"instock"}">

${product.stock}

</div>

<button class="buy-btn" onclick="goCart()">
Add To Cart
</button>

</div>

</div>

`;

});

}

/* CATEGORY FILTER */

function filterCategory(category){

currentCategory = category;

if(category==="All"){

displayProducts(allProducts);

return;

}

const filtered =
allProducts.filter(item =>
String(item.category).toLowerCase() ===
category.toLowerCase()
);

displayProducts(filtered);

}

/* SEARCH */

document.getElementById("searchInput")
.addEventListener("keyup",function(){

const value =
this.value.toLowerCase();

const filtered =
allProducts.filter(item =>
String(item.name)
.toLowerCase()
.includes(value)
);

displayProducts(filtered);

});

/* OPEN MODAL */

function openModal(product){

currentCategory = product.category;

document.getElementById("productModal")
.style.display="block";

currentImages = [

product.image,
product.img2,
product.img3,
product.img4

].filter(img =>
img && img.trim()!==""
);

currentIndex = 0;
zoomLevel = 1;

updateSlide();

document.getElementById("modalName")
.innerHTML = product.name;

document.getElementById("modalId")
.innerHTML = "Product ID : "+product.id;

document.getElementById("modalDesc")
.innerHTML = product.description2;

document.getElementById("modalSize")
.innerHTML = "Size : "+product.size;

/* PRICE */

let priceHTML="";

if(product.offer){

priceHTML=`

<div class="price-row">

<span class="old-price">
₹${product.price}
</span>

<span class="new-price">
₹${product.offer}
</span>

<div class="offer-tag">
Today Offer
</div>

</div>

`;

}else{

priceHTML=`

<div class="new-price">
₹${product.price}
</div>

`;

}

document.getElementById("modalPrice")
.innerHTML = priceHTML;

/* STOCK */

document.getElementById("modalStock")
.innerHTML =

`<div class="stock ${product.stock==="Out Of Stock" ? "outstock":"instock"}">
${product.stock}
</div>`;

/* RANDOM REVIEWS */

const review1 =
reviews[Math.floor(Math.random()*reviews.length)];

const review2 =
reviews[Math.floor(Math.random()*reviews.length)];

const review3 =
reviews[Math.floor(Math.random()*reviews.length)];

document.getElementById("modalReview")
.innerHTML =

`
⭐ ${review1}
<br><br>

⭐ ${review2}
<br><br>

⭐ ${review3}
`;

}

/* CLOSE MODAL */

function closeModal(){

document.getElementById("productModal")
.style.display="none";

window.scrollTo({
top:0,
behavior:"smooth"
});

}

/* IMAGE SLIDER */

function updateSlide(){

const img =
document.getElementById("slideImage");

img.src =
currentImages[currentIndex];

img.style.transform =
`scale(${zoomLevel})`;

}

/* NEXT */

function nextSlide(){

if(currentIndex <
currentImages.length-1){

currentIndex++;

updateSlide();

}

}

/* PREVIOUS */

function prevSlide(){

if(currentIndex > 0){

currentIndex--;

updateSlide();

}

}

/* ZOOM */

function zoomIn(){

zoomLevel += 0.2;

updateSlide();

}

function zoomOut(){

if(zoomLevel > 1){

zoomLevel -= 0.2;

updateSlide();

}

}

/* MORE BUTTON */

function goMore(){

closeModal();

filterCategory(currentCategory);

window.scrollTo({

top:500,
behavior:"smooth"

});

}

/* CART PAGE */

function goCart(){

window.location.href = "cart.html";

}

/* LOAD */

fetchProducts();

</script>
