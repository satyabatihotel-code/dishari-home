<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/12klOqNz4ER47bvsZrvqJMkYnghi_T63J_LmaYvNeb9c/gviz/tq?tqx=out:json&sheet=Dishari1";

let allProducts = [];

let currentImages = [];
let currentIndex = 0;
let zoomLevel = 1;
let currentCategory = "New Arrivals";

const reviews = [

"Excellent quality and beautiful fitting.",
"Very soft fabric and premium design.",
"Looks exactly same as picture.",
"Super comfortable for daily wear.",
"Perfect product for this price range.",
"Packaging and delivery was impressive.",
"Colour and stitching both are amazing.",
"Very stylish and elegant collection.",
"Fabric quality exceeded expectations.",
"Loved the trendy modern look.",
"Perfect festive collection for women.",
"Material feels rich and comfortable."

];

async function fetchProducts(){

const response = await fetch(sheetURL);
const text = await response.text();

const json = JSON.parse(text.substring(47).slice(0,-2));

const rows = json.table.rows;

allProducts = rows.map((row,index)=>{

const cols = row.c || [];

return{

priority: cols[0]?.v || "",
name: cols[1]?.v || "",
category: cols[2]?.v || "",
show: cols[3]?.v || "",
price: cols[4]?.v || "",
description: cols[5]?.v || "",

image: cols[6]?.v || "",
stock: cols[7]?.v || "",
offer: cols[8]?.v || "",

img2: cols[9]?.v || "",
img3: cols[10]?.v || "",
img4: cols[11]?.v || "",

size: cols[12]?.v || "",
description2: cols[13]?.v || "",

id:"DS"+(100000+index)

};

})

.filter(item =>
String(item.show).toLowerCase()==="yes"
)

.sort((a,b)=>
Number(a.priority)-Number(b.priority)
);

const newArrivalProducts = allProducts.filter(item =>
String(item.category).toLowerCase()==="new arrivals"
);

displayProducts(newArrivalProducts);

}

function displayProducts(products){

const container =
document.getElementById("productGrid");

container.innerHTML="";

products.forEach((product,index)=>{

let actualIndex = allProducts.indexOf(product);

let priceHTML="";

if(product.offer){

priceHTML=`

<div class="price-row">

<span class="old-price">
₹${product.price}
</span>

<span class="new-price">
₹${product.offer}
</span>

<br>

<div class="offer-tag">
Today Offer
</div>

</div>

`;

}else{

priceHTML=`

<div class="price-row">

<span class="new-price">
₹${product.price}
</span>

</div>

`;

}

container.innerHTML += `

<div class="product-card">

<img
class="product-image"
loading="lazy"
onclick="openModalByIndex(${actualIndex})"
src="${product.image}">

<div class="product-details">

<div class="product-id">
${product.id}
</div>

<div class="product-name">
${product.name}
</div>

<div class="product-description">
${product.description}
</div>

${priceHTML}

<div class="stock ${product.stock==="Out Of Stock" ? "outstock":"instock"}">

${product.stock}

</div>

<button class="buy-btn" onclick="goCart()">
Add To Cart
</button>

</div>

</div>

`;

});

}

function openModalByIndex(index){

const product = allProducts[index];

openModal(product);

}

function filterCategory(category){

currentCategory = category;

if(category==="All"){

displayProducts(allProducts);
return;

}

const filtered = allProducts.filter(item =>
String(item.category).toLowerCase()===category.toLowerCase()
);

displayProducts(filtered);

}

document.getElementById("searchInput")
.addEventListener("keyup",function(){

const value=this.value.toLowerCase();

const filtered=allProducts.filter(item =>
String(item.name).toLowerCase().includes(value)
);

displayProducts(filtered);

});

function openModal(product){

currentCategory = product.category;

document.getElementById("productModal").style.display="block";

currentImages = [

product.image,
product.img2,
product.img3,
product.img4

].filter(img => img && img.trim() !== "");

currentIndex=0;
zoomLevel=1;

updateSlide();

document.getElementById("modalName").innerHTML =
product.name;

document.getElementById("modalId").innerHTML =
"Product ID : "+product.id;

document.getElementById("modalSize").innerHTML =
"Size : "+product.size;

document.getElementById("modalDesc").innerHTML =
product.description2;

let priceHTML="";

if(product.offer){

priceHTML=`

<div class="price-row">

<span class="old-price">
₹${product.price}
</span>

<span class="new-price">
₹${product.offer}
</span>

<div class="offer-tag">
Today Offer
</div>

</div>

`;

}else{

priceHTML=`

<div class="new-price">
₹${product.price}
</div>

`;

}

document.getElementById("modalPrice").innerHTML =
priceHTML;

document.getElementById("modalStock").innerHTML =
`<div class="stock ${product.stock==="Out Of Stock" ? "outstock":"instock"}">${product.stock}</div>`;

const randomReview1 =
reviews[Math.floor(Math.random()*reviews.length)];

const randomReview2 =
reviews[Math.floor(Math.random()*reviews.length)];

const randomReview3 =
reviews[Math.floor(Math.random()*reviews.length)];

document.getElementById("modalReview").innerHTML =
`
⭐ ${randomReview1}<br><br>
⭐ ${randomReview2}<br><br>
⭐ ${randomReview3}
`;

}

function closeModal(){

document.getElementById("productModal").style.display="none";

window.scrollTo({
top:0,
behavior:"smooth"
});

}

function updateSlide(){

const img =
document.getElementById("slideImage");

img.src =
currentImages[currentIndex];

img.style.transform=`scale(${zoomLevel})`;

}

function nextSlide(){

if(currentIndex < currentImages.length-1){

currentIndex++;
updateSlide();

}

}

function prevSlide(){

if(currentIndex > 0){

currentIndex--;
updateSlide();

}

}

function zoomIn(){

zoomLevel +=0.2;
updateSlide();

}

function zoomOut(){

if(zoomLevel>1){

zoomLevel -=0.2;
updateSlide();

}

}

function goMore(){

closeModal();

filterCategory(currentCategory);

window.scrollTo({
top:500,
behavior:"smooth"
});

}

function goCart(){

window.location.href="cart.html";

}

fetchProducts();

</script>
